version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

services:
  # ===== 后端 API =====
  backend:
    <<: [*restart-policy]
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://kbuser:kbpass@postgres:5432/knowledge_base
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-kbadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-kbadmin123}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?必须设置 OPENAI_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:?必须设置 SECRET_KEY}
      - APP_NAME=${APP_NAME:-Enterprise Knowledge Base}
      - DEBUG=false
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "0.5"
          memory: "1G"
    logging: *default-logging

  # ===== Celery Worker =====
  celery_worker:
    <<: [*restart-policy]
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://kbuser:kbpass@postgres:5432/knowledge_base
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-kbadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-kbadmin123}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?必须设置 OPENAI_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:?必须设置 SECRET_KEY}
      - DEBUG=false
      - LOG_LEVEL=INFO
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
    logging: *default-logging

  # ===== 向量数据库 =====
  qdrant:
    <<: [*restart-policy]
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2G"
    logging: *default-logging

  # ===== PostgreSQL =====
  postgres:
    <<: [*restart-policy]
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kbuser
      POSTGRES_PASSWORD: kbpass
      POSTGRES_DB: knowledge_base
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbuser -d knowledge_base"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"
    logging: *default-logging

  # ===== Redis =====
  redis:
    <<: [*restart-policy]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    logging: *default-logging

  # ===== MinIO 对象存储 =====
  minio:
    <<: [*restart-policy]
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-kbadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-kbadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    logging: *default-logging

  # ===== 前端 =====
  frontend:
    <<: [*restart-policy]
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    logging: *default-logging

  # ===== Nginx 反向代理 =====
  nginx:
    <<: [*restart-policy]
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    logging: *default-logging

  # ===== Prometheus =====
  prometheus:
    <<: [*restart-policy]
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "1G"
    logging: *default-logging

  # ===== Grafana =====
  grafana:
    <<: [*restart-policy]
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    logging: *default-logging

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
