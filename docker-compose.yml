services:
  # === AI 模型服务 ===
  ollama:
    image: ollama/ollama:latest
    container_name: kb-ollama
    volumes:
      - ollama_data:/root/.ollama
      - ~/.ollama/models:/host-models:ro
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    restart: unless-stopped
    networks:
      - kb-network

  # === 向量数据库 ===
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: kb-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - kb-network

  # === 关系数据库 (元数据) ===
  postgres:
    image: postgres:16-alpine
    container_name: kb-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=kbuser
      - POSTGRES_PASSWORD=kbpass
      - POSTGRES_DB=knowledge_base
    restart: unless-stopped
    networks:
      - kb-network

  # === 缓存 & 消息队列 ===
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - kb-network

  # === 对象存储 (文档原始文件) ===
  minio:
    image: minio/minio:latest
    container_name: kb-minio
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=kbadmin
      - MINIO_ROOT_PASSWORD=kbadmin123
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - kb-network

  # === 后端 API 服务 ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb-backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://kbuser:kbpass@postgres:5432/knowledge_base
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_LOCAL_PATH=
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=kbadmin
      - MINIO_SECRET_KEY=kbadmin123
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - kb-network

  # === Celery Worker (异步文档处理) ===
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://kbuser:kbpass@postgres:5432/knowledge_base
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=kbadmin
      - MINIO_SECRET_KEY=kbadmin123
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      - backend
      - redis
    restart: unless-stopped
    networks:
      - kb-network

volumes:
  ollama_data:
  qdrant_data:
  postgres_data:
  redis_data:
  minio_data:

networks:
  kb-network:
    driver: bridge
